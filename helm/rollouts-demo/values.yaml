replicaCount: 1

image:
  repository: argoproj/rollouts-demo
  tag: green

containerPort: 8080

resources:
  requests:
    memory: 32Mi
    cpu: 5m

canary:
  steps:
    - setWeight: 5
    - pause: {}
    - setWeight: 20
    - pause: {duration: 10s}
    - setWeight: 40
    - pause: {duration: 10s}
    - setWeight: 60
    - pause: {duration: 10s}
    - setWeight: 80
    - pause: {duration: 10s}

gateway:
  hosts:
    - "*"

virtualService:
  hosts:
    - "*"

argocd:
  repoURL: https://github.com/giovany79/argo-rollout.git
  targetRevision: main
  path: helm/rollouts-demo
