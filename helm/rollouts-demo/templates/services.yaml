apiVersion: v1
kind: Service
metadata:
  name: {{ include "rollouts-demo.name" . }}-canary
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "rollouts-demo.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rollouts-demo.name" . }}-stable
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "rollouts-demo.selectorLabels" . | nindent 4 }}
