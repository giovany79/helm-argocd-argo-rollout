apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "rollouts-demo.name" . }}-vsvc
spec:
  gateways:
  - {{ include "rollouts-demo.name" . }}-gateway
  hosts:
  {{- toYaml .Values.virtualService.hosts | nindent 2 }}
  http:
  - name: primary
    route:
    - destination:
        host: {{ include "rollouts-demo.name" . }}-stable
      weight: 100
    - destination:
        host: {{ include "rollouts-demo.name" . }}-canary
      weight: 0
